spring.application.name=StockFlow


# ===============================
# SERVER CONFIG
# ===============================
server.port=8081

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/stockflow_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# LOGGING (OPTIONAL)
# ===============================
logging.level.org.springframework.security=DEBUG

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=mysupersecretkeymysupersecretkey123456
jwt.expiration=86400000


